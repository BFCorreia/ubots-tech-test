services:
  postgres:
    image: postgres:15-alpine
    container_name: flowpay-postgres
    environment:
      POSTGRES_DB: flowpay
      POSTGRES_USER: flowpay_user
      POSTGRES_PASSWORD: flowpay_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay_user -d flowpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flowpay-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: flowpay_user
      RABBITMQ_DEFAULT_PASS: flowpay_password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowpay-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/flowpay
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowpay-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
